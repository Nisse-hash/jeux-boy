<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeux Boy - Les Egouts Sombres</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- VIGNETTE OVERLAY -->
    <div id="vignette"></div>

    <div id="game">
        <!-- TOP BAR -->
        <header id="top-bar">
            <div class="top-left">
                <div class="badge turn-badge" id="turn-badge">Tour 1</div>
            </div>
            <div class="top-center">
                <div class="encounter-icon">⚔</div>
                <h1 class="encounter-name">Les Égouts Sombres</h1>
                <p class="encounter-sub" id="flavor-text">L'odeur de pourriture vous saisit... des yeux rouges brillent dans l'obscurité.</p>
            </div>
            <div class="top-right">
                <div class="badge phase-badge" id="phase-badge">Phase Héros</div>
            </div>
        </header>

        <!-- MAIN LAYOUT -->
        <div id="main-layout">
            <!-- TACTICAL MAP -->
            <div id="map-wrap">
                <div id="tactical-map">
                    <div id="map-decor"></div>

                    <div class="zone-row zone-distance" data-zone="distance">
                        <div class="zone-label-wrap"><span class="zone-tag">Distance</span><span class="zone-range">3</span></div>
                        <div class="zone-slots" id="slots-distance"></div>
                    </div>
                    <div class="zone-row zone-mixte" data-zone="mixte">
                        <div class="zone-label-wrap"><span class="zone-tag">Mixte</span><span class="zone-range">2</span></div>
                        <div class="zone-slots" id="slots-mixte"></div>
                    </div>
                    <div class="zone-sep"><div class="sep-line"></div><span class="sep-text">Ligne de Front</span><div class="sep-line"></div></div>
                    <div class="zone-row zone-melee" data-zone="melee">
                        <div class="zone-label-wrap"><span class="zone-tag">Mélée</span><span class="zone-range">1</span></div>
                        <div class="zone-slots" id="slots-melee"></div>
                    </div>
                    <div class="zone-sep hero-sep"><div class="sep-line green"></div><span class="sep-text green-text">Héros</span><div class="sep-line green"></div></div>
                    <div class="zone-row zone-heroes" data-zone="heroes">
                        <div class="zone-slots" id="slots-heroes"></div>
                    </div>

                    <div id="particles"></div>
                </div>
            </div>

            <!-- SIDEBAR -->
            <aside id="sidebar">
                <div id="dice-panel">
                    <div class="panel-title">
                        <span class="panel-icon">🎲</span>
                        <span>Dés</span>
                        <span id="dice-phase-label" class="phase-chip">Prêt</span>
                    </div>
                    <div id="dice-tray"></div>
                    <div id="action-bar">
                        <button id="btn-roll" class="btn-primary" onclick="rollDice()">Lancer les Dés</button>
                        <button id="btn-end-turn" class="btn-secondary" onclick="endTurn()" style="display:none;">Fin du Tour</button>
                        <button id="btn-restart" class="btn-primary" onclick="restartGame()" style="display:none;">Recommencer</button>
                    </div>
                </div>

                <div id="combat-log">
                    <div class="panel-title log-title"><span class="panel-icon">📜</span><span>Journal</span></div>
                    <div id="log-entries"></div>
                </div>
            </aside>
        </div>
    </div>

    <div id="dice-overlay" class="hidden">
        <div id="dice-animation-container">
            <div class="dice-3d" id="dice-anim-1"></div>
            <div class="dice-3d" id="dice-anim-2"></div>
        </div>
    </div>

    <div id="game-over-overlay" class="hidden">
        <div id="game-over-content"></div>
    </div>

    <script src="game.js"></script>
</body>
</html>
