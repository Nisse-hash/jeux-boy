<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeux Boy - Demo Encounter</title>
    <link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Cinzel:wght@400;700;900&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game">
        <!-- ENCOUNTER TITLE -->
        <div id="encounter-header">
            <h1 class="encounter-title">Rencontre</h1>
            <p class="encounter-subtitle">Les Egouts Sombres</p>
            <p class="encounter-flavor">L'odeur de pourriture vous saisit alors que des yeux rouges brillent dans l'obscurité. Des couinements aigus résonnent contre les murs humides...</p>
        </div>

        <!-- BATTLEFIELD -->
        <div id="battlefield">
            <!-- Enemy Side -->
            <div id="enemy-zone">
                <div class="zone-label">Ennemis</div>
                <div id="enemy-cards" class="card-row">
                    <!-- Rats generated by JS -->
                </div>
            </div>

            <!-- Combat Log -->
            <div id="combat-log">
                <div id="log-entries"></div>
            </div>

            <!-- Hero Side -->
            <div id="hero-zone">
                <div class="zone-label">Héros</div>
                <div id="hero-cards" class="card-row">
                    <!-- Hero generated by JS -->
                </div>
            </div>
        </div>

        <!-- DICE AREA -->
        <div id="dice-area">
            <div id="dice-tray">
                <!-- Dice rendered by JS -->
            </div>
            <div id="action-bar">
                <button id="btn-roll" class="action-btn" onclick="rollDice()">Lancer les Dés</button>
                <button id="btn-end-turn" class="action-btn secondary" onclick="endTurn()" style="display:none;">Fin du Tour</button>
                <button id="btn-restart" class="action-btn" onclick="restartGame()" style="display:none;">Recommencer</button>
            </div>
            <div id="turn-info"></div>
        </div>
    </div>

    <!-- DICE ROLL OVERLAY -->
    <div id="dice-overlay" class="hidden">
        <div id="dice-animation-container">
            <div class="dice-3d" id="dice-anim-1"></div>
            <div class="dice-3d" id="dice-anim-2"></div>
        </div>
    </div>

    <!-- DAMAGE POPUP TEMPLATE -->
    <template id="damage-popup-template">
        <div class="damage-popup"></div>
    </template>

    <script src="game.js"></script>
</body>
</html>
